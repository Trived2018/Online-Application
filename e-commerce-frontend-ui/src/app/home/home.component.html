<div class="container mt-5">

   <mat-form-field appearance="outline" class="w-100">
      <mat-label>Search any product</mat-label>
      <input matInput
      #searchkeyword
      (keyup)="searchByKeyword(searchkeyword.value)" name="searchKey" id="searchKey" placeholder="Search any product">
      <mat-hint>Search any product</mat-hint>
   </mat-form-field>

   <mat-grid-list [cols]="gridCols" [rowHeight]="gridRowHeight" gutterSize="10">
      <mat-grid-tile *ngFor="let p of productDetails">
         <div class="product-tile-content p-3">
            <div class="image-container">
               <img class="home-page-product-image" [src]="p.productImages[0].url" alt="">
            </div>
            <div class="mt-3">
               <p class="product-title"><b>{{p.productName}}</b></p>
            </div>
             <div class="mt-1">
               <p class="product-description">{{p.productDescription}}</p>
            </div>
            <div class="mt-2">
               <b>Rs. {{p.productDiscountedPrice}}</b> &nbsp; <b style="text-decoration:line-through;">{{p.productActualPrice}}</b>
            </div>
            <div class="mt-2">
               <button class="view-details-button" type="button" mat-raised-button color="warn" (click)="showProductDetails(p.productId)">View Details</button>
            </div>
         </div>
      </mat-grid-tile>
   </mat-grid-list>

   <div class="text-center mt-5" style="padding-bottom: 100px;" *ngIf="showLoadButton">
      <button type="button" mat-raised-button color="primary"(click)="loadMoreProduct()">Load more</button>
   </div>
   <div class="mt-5" style="padding-bottom: 100px;">
      
   </div>
</div>
