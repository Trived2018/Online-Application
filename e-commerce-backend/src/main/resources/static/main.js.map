<div class="container mt-5">

    <div class="row g-4">
        <div class="col-12 col-lg-6">

            <div class="card image-container p-3">
                <img [src]="product.productImages[selectedProductIndex].url" class="product-zoom-image">
            </div>

            <div class="mt-2">
                <mat-grid-list [cols]="thumbnailColumns" gutterSize="10" rowHeight="1:1">
                    <mat-grid-tile *ngFor="let file of product.productImages; let i=index;" (click)="changeIndex(i)" style="border: 1px solid lightgray; cursor:pointer">
                         <img [src]="file.url" height="100px">
                     </mat-grid-tile>
                 </mat-grid-list> 
            </div>
            
        </div>
        <div class="col-12 col-lg-6">
            <div class="product-information">
                <div class="mt-3">
                    <h2>{{product.productName}}</h2>
                </div>
                <div class="mt-3">
                    Description: <br>
                    {{product.productDescription}}
                </div>
                <div class="mt-3">
                    <b>Rs. {{product.productDiscountedPrice}}</b>&nbsp;&nbsp;<b style="text-decoration: line-through;">{{product.productActualPrice}}</b>
                </div>
                <div class="mt-4 action-buttons">
                    <button mat-raised-button color="warn" (click)="buyProduct(product.productId)">Buy Now</button>
                    <button mat-raised-button (click)="addToCart(product.productId)">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</div>
