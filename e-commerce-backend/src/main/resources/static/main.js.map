<mat-toolbar color="primary" class="top-toolbar">

  <span>
    E-Commerce Application
  </span>
  <span class="space-buttons"></span>
  <button *ngIf="! isLoggedIn()" routerLink="/login" mat-raised-button color="primary">
    Login
  </button>
   <button *ngIf="isLoggedIn()" (click)="logout()" mat-raised-button color="warn">
    Logout
  </button>
</mat-toolbar>

<mat-toolbar color ="primary" class="nav-toolbar" *ngIf="isLoggedIn()">
  <button class="nav-button" mat-raised-button routerLink="/">Home</button>
  <button class="nav-button" *ngIf="!isAdmin()" mat-raised-button routerLink="/cart">Cart</button>
  <button class="nav-button" *ngIf="!isAdmin()" mat-raised-button routerLink="/myOrders">My Orders</button>
  <button class="nav-button" *ngIf="isAdmin()" mat-raised-button routerLink="/addNewProduct">Add New Product</button>
  <button class="nav-button" *ngIf="isAdmin()" mat-raised-button routerLink="/showProductDetails">Show Product Details</button>
  <button class="nav-button" *ngIf="isAdmin()" mat-raised-button routerLink="/orderInformation">Order Information</button>
  <button class="nav-button" *ngIf="isAdmin()" mat-raised-button routerLink="/admin/active-users">Active Users</button>
  
</mat-toolbar>
